    <title>Anatomy and Physiology OT</title>
    <script>
      // Robust Error Suppression for Vite WebSocket issues in Preview
      (function() {
        const isSocketError = (error) => {
          const msg = error?.message || error?.reason || (typeof error === 'string' ? error : JSON.stringify(error));
          if (typeof msg !== 'string') return false;
          const lowerMsg = msg.toLowerCase();
          return lowerMsg.includes('websocket') || 
                 lowerMsg.includes('failed to connect') || 
                 lowerMsg.includes('closed without opened') ||
                 lowerMsg.includes('[vite]');
        };

        // 1. Window Error Event
        window.addEventListener('error', (event) => {
          if (isSocketError(event.message) || isSocketError(event.error)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true); // Capture phase

        // 2. Unhandled Rejection
        window.addEventListener('unhandledrejection', (event) => {
          if (isSocketError(event.reason)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true); // Capture phase

        // 3. Console Error Override
        const originalConsoleError = console.error;
        console.error = function(...args) {
          if (args.some(arg => isSocketError(arg))) {
            return;
          }
          originalConsoleError.apply(console, args);
        };

        // 4. Console Log/Debug Override (for connection messages)
        const originalConsoleLog = console.log;
        console.log = function(...args) {
          if (args.some(arg => typeof arg === 'string' && (arg.includes('[vite]') || arg.includes('vite:')))) {
            return;
          }
          originalConsoleLog.apply(console, args);
        };
        
        const originalConsoleDebug = console.debug;
        console.debug = function(...args) {
           if (args.some(arg => typeof arg === 'string' && (arg.includes('[vite]') || arg.includes('vite:')))) {
            return;
          }
          originalConsoleDebug.apply(console, args);
        };
      })();
    </script>

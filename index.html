    <script>
      // Robust Error Suppression for Vite WebSocket issues in Preview
      (function() {
        const isSocketError = (error) => {
          const msg = error?.message || error?.reason || (typeof error === 'string' ? error : JSON.stringify(error));
          if (typeof msg !== 'string') return false;
          const lowerMsg = msg.toLowerCase();
          return lowerMsg.includes('websocket') || 
                 lowerMsg.includes('failed to connect') || 
                 lowerMsg.includes('closed without opened') ||
                 lowerMsg.includes('[vite]');
        };

        // 1. Window Error Event
        window.addEventListener('error', (event) => {
          if (isSocketError(event.message) || isSocketError(event.error)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true); // Capture phase

        // 2. Unhandled Rejection
        window.addEventListener('unhandledrejection', (event) => {
          if (isSocketError(event.reason)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true); // Capture phase

        // 3. Console Error Override
        const originalConsoleError = console.error;
        console.error = function(...args) {
          if (args.some(arg => isSocketError(arg))) {
            return;
          }
          originalConsoleError.apply(console, args);
        };

        // 4. Console Log/Debug Override (for connection messages)
        const originalConsoleLog = console.log;
        console.log = function(...args) {
          if (args.some(arg => typeof arg === 'string' && (arg.includes('[vite]') || arg.includes('vite:')))) {
            return;
          }
          originalConsoleLog.apply(console, args);
        };
        
        const originalConsoleDebug = console.debug;
        console.debug = function(...args) {
           if (args.some(arg => typeof arg === 'string' && (arg.includes('[vite]') || arg.includes('vite:')))) {
            return;
          }
          originalConsoleDebug.apply(console, args);
        };
      })();
    </script>

      :root {

      /* Global Reset & Typography Polish */
      body {
        background-color: var(--bg-color);
        color: #18181b;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        /* Flexbox Layout Refactor */
        display: flex;
        flex-direction: column;
        height: 100dvh; /* Dynamic viewport height */
        width: 100vw;
        overflow: hidden; /* Prevent scrolling on body, handled by #root or children */
        margin: 0;
        padding: 0;
      }

      #root {
        flex: 1; /* Grow to fill available space */
        display: flex;
        flex-direction: column;
        width: 100%;
        min-height: 0; /* Allows nested flex containers to scroll */
        position: relative;
        z-index: 10;
      }

      /* Better Text Balancing for Headers */
      h1, h2, h3, p {
        text-wrap: balance;
      }

      /* Selection Color */

        background-color: #f43f5e;
        color: white;

        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;

      /* Background Pattern */
      .bg-grid-pattern {

          linear-gradient(to right, rgba(203, 213, 225, 0.3) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(203, 213, 225, 0.3) 1px, transparent 1px);
        background-size: 40px 40px;

      /* Scrollbar Styling */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d4d4d8;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #a1a1aa;

      /* 3D Transform Utilities */
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
